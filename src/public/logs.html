<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cursor To OpenAI - Log Viewer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }
        .log-table th, .log-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .log-table tr:hover {
            background-color: rgba(0,0,0,0.05);
        }
        .log-level {
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .log-level-ERROR {
            background-color: #e74c3c;
            color: white;
        }
        .log-level-WARN {
            background-color: #f39c12;
            color: white;
        }
        .log-level-INFO {
            background-color: #27ae60;
            color: white;
        }
        .log-level-DEBUG {
            background-color: #3498db;
            color: white;
        }
        .log-level-TRACE {
            background-color: #9b59b6;
            color: white;
        }
        .log-level-HTTP {
            background-color: #1abc9c;
            color: white;
        }
        .filter-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .filter-group {
            flex: 1;
            min-width: 150px;
        }
        /* Mobile optimization */
        @media (max-width: 768px) {
            .filter-group {
                flex-basis: 100%;
                min-width: auto;
            }
            
            .table-responsive {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 5px 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            min-width: 80px;
            min-height: 36px;  /* Larger touch target */
        }
        .pagination button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        .pagination-info {
            margin-right: 15px;
            align-self: center;
            width: 100%;
            text-align: center;
            margin-bottom: 10px;
        }
        @media (min-width: 768px) {
            .pagination-info {
                width: auto;
                margin-bottom: 0;
                text-align: left;
            }
        }
        .level-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .level-checkbox {
            display: none;
        }
        .level-label {
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
            /* Larger touch target */
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .level-checkbox:checked + .level-label {
            opacity: 1;
            outline: 2px solid white;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 8px;
            padding-right: 40px; /* Space for search button */
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px; /* Avoid iOS auto zoom */
            min-height: 44px; /* Larger touch target */
            -webkit-appearance: none; /* Remove iOS default style */
            appearance: none;
        }
        .search-box button {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #555;
            padding: 10px; /* Larger touch target */
            font-size: 18px; /* Larger search icon */
        }
        .date-picker {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px; /* Avoid iOS auto zoom */
            min-height: 44px; /* Larger touch target */
            -webkit-appearance: none; /* Remove iOS default style */
            appearance: none;
        }
        /* Date picker optimization for Android */
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            width: 20px;
            height: 20px;
            padding: 5px;
        }
        /* Button style optimization */
        button {
            min-height: 44px; /* Larger touch target */
            font-size: 16px; /* Easier to tap on mobile */
        }
        /* Table handling on mobile */
        @media (max-width: 480px) {
            .log-table th:nth-child(1), 
            .log-table td:nth-child(1) {
                min-width: 120px;
            }
            .log-table th:nth-child(2), 
            .log-table td:nth-child(2) {
                min-width: 80px;
            }
        }
        /* Switch style */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
        }
        
        input:checked + .slider {
            background-color: #27ae60;
        }
        
        input:focus + .slider {
            box-shadow: 0 0 1px #27ae60;
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        .slider.round {
            border-radius: 24px;
        }
        
        .slider.round:before {
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card header-card">
            <h1>Cursor To OpenAI - Log Viewer</h1>
            <p>On this page, you can view and filter system logs.</p>
            <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                    <button id="clearCacheBtn" style="background-color: rgba(255,255,255,0.2);">Clear Cache and Refresh</button>
                    <button id="backBtn" style="background-color: rgba(255,255,255,0.2);">Back to Home</button>
                </div>
                <div>
                    <span id="adminUsername" style="margin-right: 10px; color: white;"></span>
                    <button id="logoutBtn" style="background: rgba(231, 76, 60, 0.8);">Logout</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Log Filter</h2>
            <div class="filter-container">
                <div class="filter-group">
                    <label>Log Level</label>
                    <div class="level-filter">
                        <input type="radio" name="level-filter" id="level-all" class="level-checkbox" value="ALL" checked>
                        <label for="level-all" class="level-label" style="background-color: #7f8c8d; color: white;">All</label>
                        
                        <input type="radio" name="level-filter" id="level-error" class="level-checkbox" value="ERROR">
                        <label for="level-error" class="level-label log-level-ERROR">Error</label>
                        
                        <input type="radio" name="level-filter" id="level-warn" class="level-checkbox" value="WARN">
                        <label for="level-warn" class="level-label log-level-WARN">Warning</label>
                        
                        <input type="radio" name="level-filter" id="level-info" class="level-checkbox" value="INFO">
                        <label for="level-info" class="level-label log-level-INFO">Info</label>
                        
                        <input type="radio" name="level-filter" id="level-http" class="level-checkbox" value="HTTP">
                        <label for="level-http" class="level-label log-level-HTTP">HTTP</label>
                        
                        <input type="radio" name="level-filter" id="level-debug" class="level-checkbox" value="DEBUG">
                        <label for="level-debug" class="level-label log-level-DEBUG">Debug</label>
                        
                        <input type="radio" name="level-filter" id="level-trace" class="level-checkbox" value="TRACE">
                        <label for="level-trace" class="level-label log-level-TRACE">Trace</label>
                    </div>
                </div>
                <div class="filter-group">
                    <label for="search">Search</label>
                    <div class="search-box">
                        <input type="text" id="search" placeholder="Search log content..." autocomplete="off">
                        <button id="searchBtn" aria-label="Search">🔍</button>
                    </div>
                </div>
                <div class="filter-group">
                    <label for="startTime">Start Time</label>
                    <input type="datetime-local" id="startTime" class="date-picker" pattern="[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}">
                </div>
                <div class="filter-group">
                    <label for="endTime">End Time</label>
                    <input type="datetime-local" id="endTime" class="date-picker" pattern="[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}">
                </div>
                <div class="filter-group" style="display: flex; align-items: flex-end;">
                    <button id="filterBtn" style="flex: 1; padding: 8px; background-color: #3498db;">Apply Filter</button>
                </div>
                <div class="filter-group" style="display: flex; align-items: flex-end;">
                    <button id="clearLogsBtn" style="flex: 1; padding: 8px; background-color: #e74c3c;">Clear Logs</button>
                </div>
                <div class="filter-group">
                    <label for="hideCommonLogs">Hide Common Requests</label>
                    <div style="display: flex; align-items: center; margin-top: 8px;">
                        <label class="switch" style="margin-right: 10px;">
                            <input type="checkbox" id="hideCommonLogs" checked>
                            <span class="slider round"></span>
                        </label>
                        <span id="hideStatus">Enabled</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Log List</h2>
            <div id="logsContainer">
                <div class="table-responsive">
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th style="width: 200px;">Time</th>
                                <th style="width: 100px;">Level</th>
                                <th>Content</th>
                            </tr>
                        </thead>
                        <tbody id="logsList">
                            <!-- Log data will be dynamically loaded via JavaScript -->
                        </tbody>
                    </table>
                </div>
                <div class="pagination">
                    <span class="pagination-info">Showing <span id="currentRange">0-0</span> / <span id="totalLogs">0</span> log entries</span>
                    <button id="prevPage" disabled>Previous</button>
                    <button id="nextPage" disabled>Next</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentPage = 1;
        const pageSize = 12;
        let totalLogs = 0;
        let token = localStorage.getItem('adminToken');
        let selectedLevels = []; // Empty by default, no level filter
        let hideCommonLogs = true; // Hide common request logs by default

        // Execute after page load
        document.addEventListener('DOMContentLoaded', function() {
            // Check login status
            checkAuthStatus();
            
            // Load log data
            loadLogs();
            
            // Hide common requests toggle
            const hideCommonLogsCheckbox = document.getElementById('hideCommonLogs');
            const hideStatus = document.getElementById('hideStatus');
            
            hideCommonLogsCheckbox.addEventListener('change', function() {
                hideCommonLogs = this.checked;
                hideStatus.textContent = hideCommonLogs ? 'Enabled' : 'Disabled';
                loadLogs();
            });
            
            // Back to home
            document.getElementById('backBtn').addEventListener('click', function() {
                window.location.href = '/';
            });
            
            // Clear cache and refresh
            document.getElementById('clearCacheBtn').addEventListener('click', function() {
                localStorage.removeItem('logs');
                window.location.reload();
            });
            
            // Logout
            document.getElementById('logoutBtn').addEventListener('click', function() {
                localStorage.removeItem('adminToken');
                window.location.href = '/login.html';
            });
            
            // Filter button
            document.getElementById('filterBtn').addEventListener('click', function() {
                currentPage = 1;
                loadLogs();
            });
            
            // Clear logs button
            document.getElementById('clearLogsBtn').addEventListener('click', function() {
                if (confirm('Are you sure you want to clear all logs? This action cannot be undone.')) {
                    clearLogs();
                }
            });
            
            // Previous page
            document.getElementById('prevPage').addEventListener('click', function() {
                if (currentPage > 1) {
                    currentPage--;
                    loadLogs();
                }
            });
            
            // Next page
            document.getElementById('nextPage').addEventListener('click', function() {
                if (currentPage * pageSize < totalLogs) {
                    currentPage++;
                    loadLogs();
                }
            });
            
            // Search button
            document.getElementById('searchBtn').addEventListener('click', function() {
                currentPage = 1;
                loadLogs();
            });
            
            // Search box Enter key
            document.getElementById('search').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    currentPage = 1;
                    loadLogs();
                }
            });

            // Log level filter
            document.querySelectorAll('.level-checkbox').forEach(radio => {
                radio.addEventListener('change', function() {
                    // Update selected log level
                    if (this.value === 'ALL') {
                        selectedLevels = [];
                    } else {
                        selectedLevels = [this.value];
                    }
                });
            });
            
            // Fix Android date picker issue
            const isAndroid = /Android/i.test(navigator.userAgent);
            if (isAndroid) {
                // Add special handling for Android devices
                const dateInputs = document.querySelectorAll('input[type="datetime-local"]');
                dateInputs.forEach(input => {
                    // Focus listener to ensure date picker works on Android
                    input.addEventListener('focus', function() {
                        this.click(); // Ensure date picker opens
                    });
                    
                        // Listen for input changes, handle format issues
                    input.addEventListener('change', function() {
                        if (this.value) {
                            // Ensure date format is valid
                            try {
                                const date = new Date(this.value);
                                if (!isNaN(date.getTime())) {
                                    // Format valid, no processing needed
                                } else {
                                    // Invalid format, clear input
                                    this.value = '';
                                }
                            } catch (e) {
                                    // Clear input on error
                                this.value = '';
                            }
                        }
                    });
                });
            }
        });

        // Check login status
        function checkAuthStatus() {
            const token = localStorage.getItem('adminToken');
            
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            
            // Verify token
            fetch('/v1/admin/verify', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => response.json())
            .then(data => {
                if (!data.success) {
                    localStorage.removeItem('adminToken');
                    window.location.href = '/login.html';
                } else {
                    // Display admin username
                    document.getElementById('adminUsername').textContent = `Admin: ${data.username}`;
                }
            })
            .catch(error => {
                console.error('Verification failed:', error);
                localStorage.removeItem('adminToken');
                window.location.href = '/login.html';
            });
        }

        // Load log data
        function loadLogs() {
            const search = document.getElementById('search').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            
            // Build query parameters
            const params = new URLSearchParams({
                page: currentPage,
                pageSize: pageSize
            });
            
            // Add log level filter
            if (selectedLevels.length === 1) {
                params.append('level', selectedLevels[0]);
            }
            
            if (search) {
                params.append('search', search);
            }
            
            if (startTime) {
                try {
                    params.append('startTime', new Date(startTime).toISOString());
                } catch (e) {
                    console.error('Start time format error', e);
                }
            }
            
            if (endTime) {
                try {
                    params.append('endTime', new Date(endTime).toISOString());
                } catch (e) {
                    console.error('End time format error', e);
                }
            }
            
            // Output request URL for debugging
            console.log(`Request URL: /v1/logs?${params.toString()}`);
            
            // Send request
            fetch(`/v1/logs?${params.toString()}`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to load logs');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    renderLogs(data.data);
                } else {
                    showMessage('Failed to load logs: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Load logs error:', error);
                showMessage('Load logs error: ' + error.message);
            });
        }

        // Clear logs
        function clearLogs() {
            fetch('/v1/logs', {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to clear logs');
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    loadLogs();
                    showMessage('Logs cleared');
                } else {
                    showMessage('Failed to clear logs: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Clear logs error:', error);
                showMessage('Clear logs error: ' + error.message);
            });
        }

        // Render log data
        function renderLogs(data) {
            const logsList = document.getElementById('logsList');
            logsList.innerHTML = '';
            
            if (!data.logs || data.logs.length === 0) {
                logsList.innerHTML = '<tr><td colspan="3" style="text-align: center;">No matching logs found</td></tr>';
                document.getElementById('prevPage').disabled = true;
                document.getElementById('nextPage').disabled = true;
                document.getElementById('currentRange').textContent = '0-0';
                document.getElementById('totalLogs').textContent = '0';
                return;
            }
            
            // Paths to exclude
            const excludePaths = [
                'GET /styles.css', 
                'GET /v1/logs', 
                'GET /logs.html'
            ];
            
            // Filter logs based on user settings
            let logsToRender = data.logs;
            let totalToShow = data.total;
            
            if (hideCommonLogs) {
                // Filter out logs that should not be displayed
                logsToRender = data.logs.filter(log => {
                    if (log.level === 'HTTP') {
                        // Check if path should be excluded
                        for (const path of excludePaths) {
                            if (log.message.includes(path)) {
                                return false;
                            }
                        }
                    }
                    return true;
                });
                
                // If no logs after filtering
                if (logsToRender.length === 0) {
                    logsList.innerHTML = '<tr><td colspan="3" style="text-align: center;">No matching logs found</td></tr>';
                    document.getElementById('prevPage').disabled = true;
                    document.getElementById('nextPage').disabled = true;
                    document.getElementById('currentRange').textContent = '0-0';
                    document.getElementById('totalLogs').textContent = '0';
                    return;
                }
                
                // Update total count
                totalToShow = data.total - (data.logs.length - logsToRender.length);
            }
            
            // Update total and pagination info
            totalLogs = totalToShow;
            const start = (currentPage - 1) * pageSize + 1;
            const end = Math.min(currentPage * pageSize, totalToShow);
            document.getElementById('currentRange').textContent = `${start}-${end}`;
            document.getElementById('totalLogs').textContent = totalToShow;
            
            // Update pagination button state
            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = end >= totalToShow;
            
            // Render log list
            logsToRender.forEach(log => {
                const row = document.createElement('tr');
                
                // Format time
                const timestamp = new Date(log.timestamp);
                const formattedTime = timestamp.toLocaleString('en-US');
                
                row.innerHTML = `
                    <td>${formattedTime}</td>
                    <td><span class="log-level log-level-${log.level}">${log.level}</span></td>
                    <td>${log.message}</td>
                `;
                
                logsList.appendChild(row);
            });
        }

        // Show message
        function showMessage(message) {
            alert(message);
        }
        
        // Add token to all log API requests
        (function() {
            const originalFetch = window.fetch;
            window.fetch = function(url, options = {}) {
                // If log API request, add token
                if (url.includes('/v1/logs') && !url.includes('/v1/admin/')) {
                    const token = localStorage.getItem('adminToken');
                    options.headers = {
                        ...options.headers,
                        'Authorization': `Bearer ${token}`
                    };
                }
                return originalFetch(url, options);
            };
        })();
    </script>
</body>
</html>
